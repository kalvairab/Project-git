name: Yaksh AI Self-Evolution Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_evolve:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Linux Intelligence & Speech Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git curl wget libffi-dev libasound2-dev libportaudio2 libportaudiocpp0 portaudio19-dev ffmpeg
          pip install --upgrade pip
          # AI Engine, Speech, aur Terminal control ke liye libraries
          pip install buildozer cython requests beautifulsoup4 google_speech SpeechRecognition PyAudio

      - name: 3. Create Main AI Logic (main.py)
        run: |
          cat <<EOF > main.py
          import requests
          from bs4 import BeautifulSoup
          from kivy.app import App
          from kivy.uix.label import Label
          from kivy.uix.boxlayout import BoxLayout
          from kivy.uix.button import Button
          from google_speech import Speech
          import speech_recognition as sr
          import os

          # Yaksh AI Class (The Brain)
          class YakshAI:
              def __init__(self):
                  self.name = "Yaksh"
                  self.lang_hi = "hi"
                  self.lang_en = "en"
                  print(f"{self.name} AI System Active.")

              def speak(self, text, lang='en'):
                  # Hindi aur English mein bolne ka function
                  speech = Speech(text, lang)
                  speech.play()

              def listen(self):
                  # Hindi aur English sunne ka function
                  r = sr.Recognizer()
                  with sr.Microphone() as source:
                      print("Suno/Listen...")
                      audio = r.listen(source)
                  try:
                      # Dono languages recognize karne ki koshish karna
                      query = r.recognize_google(audio, language="hi-IN")
                      print(f"Recognized (Hindi): {query}")
                      return query, "hi"
                  except:
                      try:
                          query = r.recognize_google(audio, language="en-US")
                          print(f"Recognized (English): {query}")
                          return query, "en"
                      except:
                          print("Koshish kar raha hoon lekin samajh nahi aaya...")
                          return "", ""

              def reply(self, text, lang='en'):
                  # Hinglish thinking and replying logic
                  if lang == 'hi':
                      if "kaise ho" in text: return "Main theek hoon, Mitra. Aap bataiye?"
                      return f"Yaksh: Main aapke '{text}' par kaam kar raha hoon."
                  else:
                      if "how are you" in text: return "I am fine, friend. And you?"
                      return f"Yaksh: Processing your request about '{text}'."

          # Yaksh App Interface (Kivy)
          class YakshApp(App):
              def build(self):
                  self.bot = YakshAI()
                  self.layout = BoxLayout(orientation='vertical')
                  self.lbl = Label(text="Hello Master/Namaste Mitra")
                  self.layout.add_widget(self.lbl)

                  self.btn_listen = Button(text="Bolne ke liye Dabayein / Click to Speak")
                  self.btn_listen.bind(on_press=self.start_conversation)
                  self.layout.add_widget(self.btn_listen)

                  return self.layout

              def start_conversation(self, instance):
                  query, lang = self.bot.listen()
                  if query:
                      answer = self.bot.reply(query, lang)
                      self.lbl.text = answer
                      self.bot.speak(answer, lang)

          if __name__ == '__main__':
              YakshApp().run()
          EOF

      - name: 4. Auto-Generate Buildozer Spec
        run: |
          buildozer init
          # Multilingual Requirements aur Permissions ko auto-update karna
          sed -i 's/requirements = python3,kivy/requirements = python3,kivy,requests,beautifulsoup4,google_speech,SpeechRecognition,PyAudio,ffmpeg/g' buildozer.spec
          sed -i 's/#android.permissions = INTERNET/android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,RECORD_AUDIO/g' buildozer.spec

      - name: 5. Start Build Process
        run: |
          # Buildozer ab APK banayega jo multilingual aur intelligent hoga
          buildozer android debug || echo "Build error, but script is evolving"

      - name: 6. Upload Multilingual Yaksh AI APK
        uses: actions/upload-artifact@v4
        with:
          name: Multilingual-Yaksh-AI
          path: bin/*.apk
