import os
import subprocess

def run_command(command, description):
    """Terminal command chalane aur error handle karne ke liye"""
    print(f"Yaksh: {description}...")
    try:
        subprocess.run(command, shell=True, check=True)
    except subprocess.CalledProcessError as e:
        print(f"Error: {description} fail ho gaya. {e}")

def setup_yaksh_engine():
    # 1. Directory Structure Create Karna
    base_dir = "yaksh_engine"
    sub_dirs = ["kernel_bridge", "neural_source", "network_layer"]
    
    print("--- YAKSH HYBRID ENGINE: INITIALIZING DOWNLOAD ---")
    
    if not os.path.exists(base_dir):
        os.makedirs(base_dir)
    
    for folder in sub_dirs:
        path = os.path.join(base_dir, folder)
        if not os.path.exists(path):
            os.makedirs(path)

    # 2. Linux Kernel Headers (Low-level interaction ke liye)
    kernel_url = "https://github.com/torvalds/linux.git"
    run_command(f"git clone --depth 1 {kernel_url} {base_dir}/kernel_bridge/linux", "Linux Kernel Sources Download")

    # 3. Neural Math Engine (Eigen Source)
    eigen_url = "https://gitlab.com/libeigen/eigen.git"
    run_command(f"git clone --depth 1 {eigen_url} {base_dir}/neural_source/eigen", "Neural Math Engine Download")

    # 4. Hybrid AI Bridge (C++ File Creation)
    cpp_content = """
#include <iostream>
int main() {
    std::cout << "Yaksh Hybrid Engine v0.2: System Online" << std::endl;
    return 0;
}
"""
    with open(os.path.join(base_dir, "engine_main.cpp"), "w") as f:
        f.write(cpp_content.strip())
    
    print("\n--- [SUCCESS] Saare Linux Source Codes 'yaksh_engine' mein save ho gaye hain ---")

if __name__ == "__main__":
    setup_yaksh_engine()
