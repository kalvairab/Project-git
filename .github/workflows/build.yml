# 1. System ko up-to-date karna
sudo apt-get update && sudo apt-get upgrade -y

# 2. Engine ke liye Core Linux Dev Tools download karna
sudo apt-get install -y build-essential libssl-dev libffi-dev python3-dev \
                       libtool autoconf automake libncurses5-dev \
                       linux-headers-$(uname -r)

# 3. Model ke liye Mathematical Source Code (OpenBLAS) download karna
git clone https://github.com/xianyi/OpenBLAS.git --depth 1

# 4. Neural Logic ke liye Eigen Library (Header-only) download karna
wget https://gitlab.com/libeigen/eigen/-/archive/3.4.0/eigen-3.4.0.tar.gz
tar -xf eigen-3.4.0.tar.gz

# 5. Yaksh Engine ki base directory banana
mkdir -p yaksh_engine/model_source
mv OpenBLAS yaksh_engine/
mv eigen-3.4.0 yaksh_engine/model_source/

echo "Yaksh: Saare Linux Source Codes aur Engine components download ho gaye hain."
