import os
import subprocess

def download_yaksh_sources():
    # Header display
    print("--- YAKSH HYBRID ENGINE: DOWNLOADING LINUX SOURCES ---")
    
    # 1. Folder structure (Line 4 fix: clear list definition)
    base_dir = "yaksh_engine"
    folders = ["core_engine", "ai_model_source", "kernel_headers", "network_bridge"]
    
    for folder in folders:
        path = os.path.join(base_dir, folder)
        os.makedirs(path, exist_ok=True)
        print(f"Directory Created: {path}")

    # 2. Linux Kernel Headers (Hardware interaction)
    print("Fetching Linux Kernel Headers...")
    subprocess.run(["git", "clone", "--depth", "1", "https://github.com/torvalds/linux.git", f"{base_dir}/kernel_headers"])

    # 3. Neural Engine Source (Math Library)
    print("Fetching Neural Math Engine...")
    subprocess.run(["git", "clone", "--depth", "1", "https://gitlab.com/libeigen/eigen.git", f"{base_dir}/ai_model_source/math_lib"])

    # 4. Network Security (SSL Bridge)
    print("Fetching Security & Network Bridge...")
    subprocess.run(["git", "clone", "--depth", "1", "https://github.com/openssl/openssl.git", f"{base_dir}/network_bridge/openssl"])

    # 5. Engine Logic Writing
    engine_file = os.path.join(base_dir, "core_engine/main_engine.cpp")
    with open(engine_file, "w") as f:
        f.write("#include <iostream>\n")
        f.write("int main() {\n")
        f.write('    std::cout << "Yaksh Hybrid Engine v0.2 Loaded" << std::endl;\n')
        f.write("    return 0;\n")
        f.write("}\n")

    print("\n[SUCCESS] Sabhi Linux Source Codes download ho gaye hain!")

if __name__ == "__main__":
    download_yaksh_sources()
